name: Build MTC Exam Creator

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: installer/MTC_Exam_Creator_Installer.iss
          options: /O+

      - name: Upload Setup.exe
        uses: actions/upload-artifact@v4
        with:
          name: MTC_EXAM_CREATOR_Setup
          path: Output/MTC_EXAM_CREATOR_Setup.exe

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-installer
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
